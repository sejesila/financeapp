<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Fin Tracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --card: #1f2937;
                --text: #f9fafb;
                --muted: #9ca3af;
            }
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f3f4f6;
                --card: #ffffff;
                --text: #111827;
                --muted: #6b7280;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: var(--card);
            border-radius: 1rem;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,.12);
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon svg { width: 40px; height: 40px; color: #fff; }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
        p  { color: var(--muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: .625rem;
            padding: .75rem 1.5rem;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            text-decoration: none;
        }
        .btn:hover { background: var(--blue-dark); }

        .status {
            margin-top: 1.5rem;
            font-size: .8rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01
                         M8.464 15.536a5 5 0 010-7.072M5.636 18.364a9 9 0 010-12.728"/>
            </svg>
        </div>

        <h1>You're offline</h1>
        <p>Fin Tracker can't reach the server right now. Check your internet connection and try again.</p>

        <button class="btn" onclick="retry()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581
                         m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Try again
        </button>

        <p class="status" id="status">Waiting for connection…</p>
    </div>

    <script>
        function retry() {
            window.location.reload();
        }

        // Auto-reload when connection is restored
        window.addEventListener('online', () => {
            document.getElementById('status').textContent = 'Connection restored! Reloading…';
            setTimeout(() => window.location.reload(), 800);
        });

        // Check connection periodically
        setInterval(() => {
            if (navigator.onLine) {
                fetch('/favicon.ico', { cache: 'no-store' })
                    .then(() => window.location.reload())
                    .catch(() => {});
            }
        }, 5000);
    </script>
</body>
</html>
